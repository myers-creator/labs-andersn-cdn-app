<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labs.Andersn.cdn</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0d10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 26px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }
        .header p {
            color: #8892b0;
            font-size: 11px;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
        }
        .day-row {
            margin-bottom: 14px;
        }
        .day-row:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            text-transform: uppercase;
            color: #39ff14;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            background-color: #0a0d10;
            border: 1px solid #00ff66;
            border-radius: 6px;
            padding: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: Arial, sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
            border-color: #ffffff;
            background-color: #121820;
        }
        .clear-btn {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            background: transparent;
            border: 1px dashed #ff3333;
            color: #ff3333;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: rgba(255, 51, 51, 0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LABS</h1>
        <p>Registro de Operaciones (Lun - Sáb)</p>
    </div>

    <div class="container">
        <div class="day-row">
            <label for="lunes">Lunes</label>
            <input type="text" id="lunes" class="day-input" placeholder="Datos del lunes...">
        </div>
        <div class="day-row">
            <label for="martes">Martes</label>
            <input type="text" id="martes" class="day-input" placeholder="Datos del martes...">
        </div>
        <div class="day-row">
            <label for="miercoles">Miércoles</label>
            <input type="text" id="miercoles" class="day-input" placeholder="Datos del miércoles...">
        </div>
        <div class="day-row">
            <label for="jueves">Jueves</label>
            <input type="text" id="jueves" class="day-input" placeholder="Datos del jueves...">
        </div>
        <div class="day-row">
            <label for="viernes">Viernes</label>
            <input type="text" id="viernes" class="day-input" placeholder="Datos del viernes...">
        </div>
        <div class="day-row">
            <label for="sabado">Sábado</label>
            <input type="text" id="sabado" class="day-input" placeholder="Datos del sábado...">
        </div>
    </div>

    <button class="clear-btn" onclick="clearLogs()">Limpiar Toda la Semana</button>

    <script>
        const inputs = document.querySelectorAll('.day-input');

        // 1. Cargar la memoria local de cada día al abrir la app
        window.addEventListener('load', () => {
            inputs.forEach(input => {
                const savedData = localStorage.getItem('labs_' + input.id);
                if (savedData) {
                    input.value = savedData;
                }
            });
            // Pone el foco automáticamente en el Lunes al arrancar
            if(inputs[0]) inputs[0].focus();
        });

        // 2. Monitorear escritura y controlar el flujo del ENTER
        inputs.forEach((input, index) => {
            // Guarda en caliente mientras el usuario escribe
            input.addEventListener('input', () => {
                localStorage.setItem('labs_' + input.id, input.value);
            });

            // Bucle infinito con la tecla Enter
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault(); // Detiene funciones por defecto
                    const nextIndex = (index + 1) % inputs.length; // Al llegar a sábado (index 5) vuelve a lunes (index 0)
                    inputs[nextIndex].focus();
                }
            });
        });

        // 3. Función táctica para resetear la tabla limpia
        function clearLogs() {
            if (confirm('¿Deseas resetear por completo los registros de la semana?')) {
                inputs.forEach(input => {
                    input.value = '';
                    localStorage.removeItem('labs_' + input.id);
                });
                inputs[0].focus();
            }
        }

        // 4. Registro del Service Worker para soporte Fuera de Línea (Offline)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Operativo'))
                    .catch(err => console.error('Fallo SW', err));
            });
        }
    </script>
</body>
</html>
