<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labs.Andersn.cdn</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0d10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }
        .header p {
            color: #8892b0;
            font-size: 11px;
            margin-top: 3px;
            text-transform: uppercase;
        }
        .setup-box {
            width: 100%;
            max-width: 500px;
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }
        .setup-box input {
            flex: 2;
            background: #0a0d10;
            border: 1px solid #00ff66;
            border-radius: 4px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            font-family: Arial, sans-serif;
            outline: none;
        }
        .setup-box select {
            flex: 1;
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 10px;
            color: #00ff66;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .btn-add {
            background: #00ff66;
            color: #0a0d10;
            border: none;
            padding: 0 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-family: inherit;
        }
        .vendors-container {
            width: 100%;
            max-width: 500px;
        }
        .vendor-card {
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px dashed #1f2937;
            padding-bottom: 6px;
        }
        .vendor-name {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .btn-del {
            background: transparent;
            color: #ff3333;
            border: none;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        .grid-days {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .day-box {
            display: flex;
            flex-direction: column;
        }
        .day-box label {
            font-size: 11px;
            color: #39ff14;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .day-box input {
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .day-box input:focus {
            border-color: #00ff66;
            box-shadow: 0 0 5px rgba(0,255,102,0.5);
        }
        .vendor-total {
            margin-top: 10px;
            text-align: right;
            font-size: 12px;
            color: #8892b0;
            font-weight: bold;
        }
        .vendor-total span {
            color: #00ff66;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(0,255,102,0.4);
        }
        .clear-all-btn {
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
            background: transparent;
            border: 1px dashed #ff3333;
            color: #ff3333;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LABS</h1>
        <p>Control de Pesajes Multiuso</p>
    </div>

    <div class="setup-box">
        <input type="text" id="newVendorName" placeholder="Nombre..." autocomplete="off">
        <select id="vendorUnit">
            <option value="kg">Kilos</option>
            <option value="@">Arrobas (@)</option>
            <option value="Lb">Libras</option>
            <option value=" ">Neutro</option>
        </select>
        <button class="btn-add" onclick="addVendor()">+ Ok</button>
    </div>

    <div class="vendors-container" id="vendorsContainer"></div>

    <button class="clear-all-btn" onclick="clearAllData()">Resetear Todo el Sistema</button>

    <script>
        let vendors = JSON.parse(localStorage.getItem('labs_matrix_vendors')) || [];

        function saveState() {
            localStorage.setItem('labs_matrix_vendors', JSON.stringify(vendors));
        }

        function addVendor() {
            const inputName = document.getElementById('newVendorName');
            const selectUnit = document.getElementById('vendorUnit');
            const name = inputName.value.trim();
            if (!name) return;

            const newVendor = {
                id: 'v_' + Date.now(),
                name: name,
                unit: selectUnit.value,
                weights: { lunes: '', martes: '', miercoles: '', jueves: '', viernes: '', sabado: '' }
            };

            vendors.push(newVendor);
            saveState();
            renderVendors();
            inputName.value = '';
            inputName.focus();
        }

        function deleteVendor(id) {
            if (confirm('¿Eliminar registro de este usuario?')) {
                vendors = vendors.filter(v => v.id !== id);
                saveState();
                renderVendors();
            }
        }

        function updateWeight(vendorId, day, value) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.weights[day] = value;
                saveState();
                calculateTotal(vendorId);
            }
        }

        function calculateTotal(vendorId) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (!vendor) return;
            
            let total = 0;
            for (let day in vendor.weights) {
                let val = parseFloat(vendor.weights[day].replace(',', '.'));
                if (!isNaN(val)) total += val;
            }
            
            document.getElementById(`total_${vendorId}`).innerText = total.toFixed(1);
        }

        function renderVendors() {
            const container = document.getElementById('vendorsContainer');
            container.innerHTML = '';

            vendors.forEach(vendor => {
                let totalInitial = 0;
                for (let day in vendor.weights) {
                    let val = parseFloat(vendor.weights[day].replace(',', '.'));
                    if (!isNaN(val)) totalInitial += val;
                }

                const currentUnit = vendor.unit !== undefined ? vendor.unit : 'kg';

                const card = document.createElement('div');
                card.className = 'vendor-card';
                card.innerHTML = `
                    <div class="vendor-header">
                        <span class="vendor-name">${vendor.name}</span>
                        <button class="btn-del" onclick="deleteVendor('${vendor.id}')">Eliminar</button>
                    </div>
                    <div class="grid-days">
                        ${['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'].map(day => `
                            <div class="day-box">
                                <label>${day.substring(0,3)}</label>
                                <input type="text" 
                                       inputmode="decimal" 
                                       class="weight-input"
                                       data-vendor="${vendor.id}" 
                                       data-day="${day}" 
                                       value="${vendor.weights[day]}" 
                                       placeholder="0"
                                       oninput="updateWeight('${vendor.id}', '${day}', this.value)">
                            </div>
                        `).join('')}
                    </div>
                    <div class="vendor-total">Total Semana: <span id="total_${vendor.id}">${totalInitial.toFixed(1)}</span> ${currentUnit}</div>
                `;
                container.appendChild(card);
            });

            setupNavigation();
        }

        function setupNavigation() {
            const inputs = document.querySelectorAll('.weight-input');
            inputs.forEach((input, index) => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextIndex = (index + 1) % inputs.length;
                        if (inputs[nextIndex]) inputs[nextIndex].focus();
                    }
                });
            });
        }

        function clearAllData() {
            if (confirm('¿Deseas resetear la base de datos por completo?')) {
                vendors = [];
                saveState();
                renderVendors();
            }
        }

        window.addEventListener('load', () => {
            renderVendors();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('SW Activo'))
                    .catch(err => console.error('SW Error', err));
            }
        });
    </script>
</body>
</html>
