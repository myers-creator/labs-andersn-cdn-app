<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labs.Andersn.cdn - Contabilidad</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0d10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }
        .header p {
            color: #8892b0;
            font-size: 11px;
            margin-top: 3px;
            text-transform: uppercase;
        }
        .setup-box {
            width: 100%;
            max-width: 500px;
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }
        .setup-box input {
            flex: 2;
            background: #0a0d10;
            border: 1px solid #00ff66;
            border-radius: 4px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            font-family: Arial, sans-serif;
            outline: none;
        }
        .setup-box select {
            flex: 1;
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 10px;
            color: #00ff66;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .btn-add {
            background: #00ff66;
            color: #0a0d10;
            border: none;
            padding: 0 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-family: inherit;
        }
        
        /* UBICACIÓN SUPERIOR: Estilos para el Panel de Contabilidad Global */
        .accounting-box {
            width: 100%;
            max-width: 500px;
            background: #161c24;
            border: 2px dashed #00ff66;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.15);
        }
        .accounting-title {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 6px;
            margin-bottom: 10px;
            color: #ffffff;
            text-align: center;
        }
        .accounting-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .acc-label {
            color: #8892b0;
            text-transform: uppercase;
        }
        .acc-value {
            color: #ffffff;
            font-weight: bold;
        }
        .acc-cashout {
            color: #00ff66;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
            font-size: 17px;
        }

        .section-title {
            width: 100%;
            max-width: 500px;
            font-size: 14px;
            color: #ffffff;
            margin: 10px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid #00ff66;
            padding-left: 8px;
        }
        .vendors-container {
            width: 100%;
            max-width: 500px;
        }
        .vendor-card {
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px dashed #1f2937;
            padding-bottom: 8px;
        }
        .vendor-name {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .btn-del {
            background: transparent;
            color: #ff3333;
            border: none;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            background: #0a0d10;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #1f2937;
        }
        .price-row label {
            font-size: 11px;
            color: #8892b0;
            text-transform: uppercase;
        }
        .price-row input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid #00ff66;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            padding: 2px;
            outline: none;
        }
        .grid-days {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .day-box {
            display: flex;
            flex-direction: column;
        }
        .day-box label {
            font-size: 11px;
            color: #39ff14;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .day-box input {
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .day-box input:focus {
            border-color: #00ff66;
            box-shadow: 0 0 5px rgba(0,255,102,0.5);
        }
        .vendor-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 102, 0.05);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 102, 0.15);
            font-size: 13px;
        }
        .total-weight-text {
            color: #8892b0;
        }
        .total-weight-text span {
            color: #ffffff;
            font-weight: bold;
        }
        .total-pay-text {
            color: #39ff14;
            font-weight: bold;
            text-align: right;
        }
        .total-pay-text span {
            font-size: 15px;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
        }
        .archive-btn {
            width: 100%;
            max-width: 500px;
            background: #00ff66;
            color: #0a0d10;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            margin: 15px 0 10px 0;
        }
        .history-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }
        .history-card {
            background: #0d1218;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8892b0;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .history-details {
            font-size: 12px;
            color: #ffffff;
            line-height: 1.5;
            font-family: Arial, sans-serif;
        }
        .clear-history-btn {
            background: transparent;
            color: #ff3333;
            border: none;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LABS</h1>
        <p>Control de Compras & Liquidación</p>
    </div>

    <div class="setup-box">
        <input type="text" id="newVendorName" placeholder="Nombre del vendedor..." autocomplete="off" onkeydown="if(event.key === 'Enter') addVendor()">
        <select id="vendorUnit">
            <option value="@">Arrobas (@)</option>
            <option value="kg">Kilos (kg)</option>
            <option value="Lb">Libras (Lb)</option>
            <option value=" ">Neutro</option>
        </select>
        <button class="btn-add" onclick="addVendor()">+ Añadir</button>
    </div>

    <div class="accounting-box">
        <div class="accounting-title">📊 BALANCE TOTAL EN VIVO</div>
        <div class="accounting-row">
            <div class="acc-label">Total Arrobas (@):</div>
            <div class="acc-value" id="global_weight_arroba">0.0 @</div>
        </div>
        <div class="accounting-row">
            <div class="acc-label">Total Kilos (kg):</div>
            <div class="acc-value" id="global_weight_kg">0.0 kg</div>
        </div>
        <div class="accounting-row">
            <div class="acc-label">Total Libras (Lb):</div>
            <div class="acc-value" id="global_weight_lb">0.0 Lb</div>
        </div>
        <div class="accounting-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #1f2937;">
            <div class="acc-label" style="color: #ffffff; font-weight: bold;">💸 SALIDA TOTAL DE CAJA:</div>
            <div class="acc-value acc-cashout" id="global_total_cashout">$0</div>
        </div>
    </div>

    <div class="section-title">Planilla de Operaciones Actual</div>
    <div class="vendors-container" id="vendorsContainer"></div>

    <button class="archive-btn" onclick="archiveWeekData()">🔒 Cerrar Semana y Guardar en Historial</button>

    <div class="section-title">Historial de Planillas Archivadas</div>
    <div class="history-container" id="historyContainer"></div>
    <button class="clear-history-btn" id="btn_clear_hist" onclick="clearHistory()" style="display:none;">⚠️ Borrar Todo el Historial Contable</button>

    <script>
        let vendors = JSON.parse(localStorage.getItem('labs_matrix_trade')) || [];
        let historyLog = JSON.parse(localStorage.getItem('labs_history_log')) || [];

        function saveState() {
            localStorage.setItem('labs_matrix_trade', JSON.stringify(vendors));
        }

        function saveHistoryState() {
            localStorage.setItem('labs_history_log', JSON.stringify(historyLog));
        }

        function addVendor() {
            const inputName = document.getElementById('newVendorName');
            const selectUnit = document.getElementById('vendorUnit');
            const name = inputName.value.trim();
            if (!name) return;

            const newVendor = {
                id: 'v_' + Date.now(),
                name: name,
                unit: selectUnit.value,
                price: '', 
                weights: { lunes: '', martes: '', miercoles: '', jueves: '', viernes: '', sabado: '' }
            };

            vendors.push(newVendor);
            saveState();
            renderVendors();
            inputName.value = '';
            inputName.focus();
        }

        function deleteVendor(id) {
            if (confirm('¿Deseas eliminar este vendedor de la planilla actual?')) {
                vendors = vendors.filter(v => v.id !== id);
                saveState();
                renderVendors();
            }
        }

        function updateWeight(vendorId, day, value) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.weights[day] = value;
                saveState();
                calculateTotals(vendorId);
                calculateGlobalAccounting();
            }
        }

        function updatePrice(vendorId, value) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.price = value;
                saveState();
                calculateTotals(vendorId);
                calculateGlobalAccounting();
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount);
        }

        function calculateTotals(vendorId) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (!vendor) return;

            let totalWeight = 0;
            for (let day in vendor.weights) {
                let valStr = (vendor.weights[day] ?? '').toString().replace(',', '.');
                let val = parseFloat(valStr);
                if (!isNaN(val)) totalWeight += val;
            }

            let priceStr = (vendor.price ?? '').toString().replace(',', '.');
            let priceVal = parseFloat(priceStr);
            let totalPay = 0;
            if (!isNaN(priceVal) && totalWeight > 0) {
                totalPay = totalWeight * priceVal;
            }

            document.getElementById(`weight_${vendorId}`).innerText = totalWeight.toFixed(1);
            document.getElementById(`pay_${vendorId}`).innerText = formatCurrency(totalPay);
        }

        function calculateGlobalAccounting() {
            let totalArrobas = 0;
            let totalKg = 0;
            let totalLb = 0;
            let totalCashout = 0;

            vendors.forEach(vendor => {
                let currentWeight = 0;
                for (let day in vendor.weights) {
                    let valStr = (vendor.weights[day] ?? '').toString().replace(',', '.');
                    let val = parseFloat(valStr);
                    if (!isNaN(val)) currentWeight += val;
                }

                let priceStr = (vendor.price ?? '').toString().replace(',', '.');
                let priceVal = parseFloat(priceStr);
                
                if (!isNaN(priceVal) && currentWeight > 0) {
                    totalCashout += (currentWeight * priceVal);
                }

                if (vendor.unit === '@') totalArrobas += currentWeight;
                else if (vendor.unit === 'kg') totalKg += currentWeight;
                else if (vendor.unit === 'Lb') totalLb += currentWeight;
            });

            document.getElementById('global_weight_arroba').innerText = totalArrobas.toFixed(1) + ' @';
            document.getElementById('global_weight_kg').innerText = totalKg.toFixed(1) + ' kg';
            document.getElementById('global_weight_lb').innerText = totalLb.toFixed(1) + ' Lb';
            document.getElementById('global_total_cashout').innerText = formatCurrency(totalCashout);
        }

        function renderVendors() {
            const container = document.getElementById('vendorsContainer');
            container.innerHTML = '';

            if(vendors.length === 0) {
                container.innerHTML = `<div style="color:#8892b0; font-size:12px; text-align:center; padding:15px;">[ No hay vendedores activos en esta planilla ]</div>`;
            }

            vendors.forEach(vendor => {
                let totalWeightInitial = 0;
                for (let day in vendor.weights) {
                    let valStr = (vendor.weights[day] ?? '').toString().replace(',', '.');
                    let val = parseFloat(valStr);
                    if (!isNaN(val)) totalWeightInitial += val;
                }

                const currentUnit = vendor.unit !== undefined ? vendor.unit : '@';

                const card = document.createElement('div');
                card.className = 'vendor-card';
                card.innerHTML = `
                    <div class="vendor-header">
                        <span class="vendor-name">${vendor.name}</span>
                        <button class="btn-del" onclick="deleteVendor('${vendor.id}')">Eliminar</button>
                    </div>

                    <div class="price-row">
                        <label>Precio Compra x ${currentUnit === ' ' ? 'Unidad' : currentUnit}:</label>
                        <input type="text" 
                               inputmode="numeric" 
                               placeholder="Ej: 135000" 
                               value="${vendor.price}" 
                               oninput="updatePrice('${vendor.id}', this.value)">
                    </div>

                    <div class="grid-days">
                        ${['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'].map(day => `
                            <div class="day-box">
                                <label>${day.substring(0,3)}</label>
                                <input type="text" 
                                       inputmode="decimal" 
                                       class="weight-input"
                                       value="${vendor.weights[day]}" 
                                       placeholder="0"
                                       oninput="updateWeight('${vendor.id}', '${day}', this.value)">
                            </div>
                        `).join('')}
                    </div>

                    <div class="vendor-summary">
                        <div class="total-weight-text">Total Recibido: <span id="weight_${vendor.id}">${totalWeightInitial.toFixed(1)}</span> ${currentUnit}</div>
                        <div class="total-pay-text">Total a Pagar: <span id="pay_${vendor.id}">$0</span></div>
                    </div>
                `;
                container.appendChild(card);
                calculateTotals(vendor.id);
            });

            setupNavigation();
            calculateGlobalAccounting();
        }

        function setupNavigation() {
            const inputs = document.querySelectorAll('.weight-input');
            inputs.forEach((input, index) => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextIndex = index + 1;
                        if (inputs[nextIndex]) inputs[nextIndex].focus();
                    }
                });
            });
        }

        function archiveWeekData() {
            if (vendors.length === 0) {
                alert("No hay operaciones registradas en la planilla actual para archivar.");
                return;
            }

            if (!confirm("¿Estás seguro de cerrar la planilla?\nEsto calculará los balances definitivos, guardará el reporte detallado en el HISTORIAL y dejará la planilla en blanco para la próxima semana.")) {
                return;
            }

            let date = new Date();
            let timestamp = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()} - ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
            
            let report = {
                id: 'h_' + Date.now(),
                date: timestamp,
                globalArrobas: 0,
                globalKg: 0,
                globalLb: 0,
                globalCashout: 0,
                vendedoresDetalle: []
            };

            vendors.forEach(vendor => {
                let totalWeight = 0;
                let desgloseDias = [];

                for (let day in vendor.weights) {
                    let valStr = (vendor.weights[day] ?? '').toString().replace(',', '.');
                    let val = parseFloat(valStr);
                    let pesoDia = !isNaN(val) ? val : 0;
                    totalWeight += pesoDia;
                    if(pesoDia > 0) {
                        desgloseDias.push(`${day.substring(0,3).toUpperCase()}: ${pesoDia}`);
                    }
                }

                let priceStr = (vendor.price ?? '').toString().replace(',', '.');
                let priceVal = parseFloat(priceStr);
                let totalPay = 0;
                if (!isNaN(priceVal) && totalWeight > 0) {
                    totalPay = totalWeight * priceVal;
                }

                report.globalCashout += totalPay;
                if (vendor.unit === '@') report.globalArrobas += totalWeight;
                else if (vendor.unit === 'kg') report.globalKg += totalWeight;
                else if (vendor.unit === 'Lb') report.globalLb += totalWeight;

                report.vendedoresDetalle.push({
                    name: vendor.name,
                    unit: vendor.unit,
                    price: !isNaN(priceVal) ? priceVal : 0,
                    totalWeight: totalWeight,
                    totalPay: totalPay,
                    diasText: desgloseDias.length > 0 ? desgloseDias.join(' | ') : 'Sin registros'
                });
            });

            historyLog.unshift(report);
            saveHistoryState();

            vendors = [];
            saveState();

            renderVendors();
            renderHistory();
            
            alert("Planilla liquidada con éxito. Datos transferidos de forma segura al historial permanente.");
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const btnClear = document.getElementById('btn_clear_hist');
            container.innerHTML = '';

            if (historyLog.length === 0) {
                container.innerHTML = `<div style="color:#8892b0; font-size:11px; text-align:center; padding:10px;">[ Historial vacío ]</div>`;
                btnClear.style.display = 'none';
                return;
            }

            btnClear.style.display = 'block';

            historyLog.forEach(item => {
                let htmlVendedores = item.vendedoresDetalle.map(v => `
                    <div style="margin-top:5px; padding-top:5px; border-top:1px dashed #1f2937;">
                        • <strong>${v.name}</strong> (${v.unit}): ${v.totalWeight.toFixed(1)} ${v.unit} x ${formatCurrency(v.price)} = <strong>${formatCurrency(v.totalPay)}</strong><br>
                        <span style="color:#8892b0; font-size:11px;">&nbsp;&nbsp;Detalle: ${v.diasText}</span>
                    </div>
                `).join('');

                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-header">
                        <span>📅 CIERRE: ${item.date}</span>
                        <span style="color:#00ff66; font-weight:bold;">CAJA: ${formatCurrency(item.globalCashout)}</span>
                    </div>
                    <div class="history-details">
                        <strong>Totales de Carga:</strong> 
                        ${item.globalArrobas > 0 ? `${item.globalArrobas.toFixed(1)}@ ` : ''}
                        ${item.globalKg > 0 ? `${item.globalKg.toFixed(1)}kg ` : ''}
                        ${item.globalLb > 0 ? `${item.globalLb.toFixed(1)}Lb` : ''}
                        
                        <div style="margin-top:4px; font-size:11px; color:#39ff14; font-weight:bold;">DESGLOSE POR VENDEDOR:</div>
                        ${htmlVendedores}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function clearHistory() {
            if (confirm('🚨 ¿ADVERTENCIA CRÍTICA?\nVas a borrar por completo todo el registro histórico de contabilidad de la aplicación.\nEsta operación NO se puede deshacer.')) {
                historyLog = [];
                saveHistoryState();
                renderHistory();
            }
        }

        window.addEventListener('load', () => {
            renderVendors();
            renderHistory();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('SW Sincronizado'))
                    .catch(err => console.error('SW Error', err));
            }
        });
    </script>
</body>
</html>
